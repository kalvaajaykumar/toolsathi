<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tool — Toolsathi</title>
  <link rel="icon" type="image/png" href="assets/images/app_logo.png?v=1.2">
  <link rel="apple-touch-icon" href="assets/images/app_logo.png?v=1.2">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dynamic.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-main text-primary">

                      <!-- Navigation -->
  <header class="glass-nav z-50" style="transition: all 0.3s; z-index: 50;">
    <div style="max-width: 72rem; margin: 0 auto; padding: 0 1rem; height: 4rem; display: flex; align-items: center; justify-content: space-between;">
      <a href="index.html" class="logo flex items-center cursor-pointer hover:opacity-80 transition-opacity group" style="text-decoration: none; gap: 0.5rem;" >
        <img src="assets/images/app_logo.png?v=1.2" alt="Toolsathi Logo" class="app-logo flex-shrink-0" loading="lazy" onerror="this.onerror=null; this.outerHTML='<span style=\'display:flex; width:32px; height:32px; align-items:center; justify-content:center; background:var(--accent-violet); color:white; border-radius:0.25rem; font-weight:bold;\'>T</span>'" />
        <span class="font-display font-semibold text-lg tracking-tight" style="color: var(--text-primary);">Toolsathi</span>
      </a>

      <!-- Desktop Nav -->
      <nav class="nav-links" id="nav-links" style="align-items: center; gap: 0.25rem;">
        <a href="index.html" class="nav-item" style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); text-decoration: none;">Home</a>
        <a href="ai-tools.html" class="nav-item" style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); text-decoration: none;">AI Tools</a>
        <a href="blog.html" class="nav-item" style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); text-decoration: none;">Blog</a>
        <a href="about.html" class="nav-item" style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); text-decoration: none;">About</a>
        <a href="index.html#feedback" class="nav-item" style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); text-decoration: none;">Feedback</a>
        
        <div class="dropdown-wrapper" style="position: relative;">
          <a href="index.html#tools" class="nav-item flex-center gap-1 dropdown-toggle" style="padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); text-decoration: none; cursor: pointer;">
            Tools
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6" /></svg>
          </a>
          <div class="dropdown-content" id="desktop-tools-dropdown" style="position: absolute; top: 100%; right: 0; margin-top: 0.25rem; width: 13rem; border-radius: 0.75rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); background: rgba(13,17,32,0.97); border: 1px solid var(--border-subtle); backdrop-filter: blur(20px);">
          </div>
        </div>
      </nav>

      <!-- Right side -->
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <button class="theme-toggle flex-center transition-all hover-scale" id="theme-toggle" aria-label="Toggle dark mode" style="width: 2.25rem; height: 2.25rem; border-radius: 0.5rem; transition: transform 0.2s; background: var(--bg-card); border: 1px solid var(--border-subtle); cursor: pointer; display: flex; align-items: center; justify-content: center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="sun-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #FCD34D;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="hamburger md:hidden" id="hamburger" style="width: 2.25rem; height: 2.25rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; background: transparent; border: none; cursor: pointer;">
          <span class="hamburger-line" style="width: 1.5rem; height: 2px; background: var(--text-primary); transition: all 0.3s transform;"></span>
          <span class="hamburger-line" style="width: 1.5rem; height: 2px; background: var(--text-primary); transition: all 0.3s opacity;"></span>
          <span class="hamburger-line" style="width: 1.5rem; height: 2px; background: var(--text-primary); transition: all 0.3s transform;"></span>
        </button>
      </div>    
    </div>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu" style="position: absolute; top: 100%; left: 0; right: 0; background: rgba(8,11,20,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); display: none; flex-direction: column; padding: 1rem; gap: 0.25rem;">
      <a href="index.html" class="nav-item" style="padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); text-decoration: none;">Home</a>
      <a href="ai-tools.html" class="nav-item" style="padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); text-decoration: none;">AI Tools</a>
      <a href="blog.html" class="nav-item" style="padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); text-decoration: none;">Blog</a>
      <a href="about.html" class="nav-item" style="padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); text-decoration: none;">About</a>
      <a href="index.html#feedback" class="nav-item" style="padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); text-decoration: none;">Feedback</a>
      <div style="padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 0.5rem;">Tools</div>
      <div id="mobile-tools-dropdown" style="display: flex; flex-direction: column; gap: 0.25rem;"></div>
    </div>
    <script>
      async function loadNavTools() {
        try {
          const res = await fetch('data/tools.json?v=' + Date.now());
          const jsonTools = await res.json();
          const customTools = JSON.parse(localStorage.getItem('ts-custom-tools') || '[]');
          const hiddenIds = JSON.parse(localStorage.getItem('ts-hidden-tools') || '[]');
          const deletedIds = JSON.parse(localStorage.getItem('ts-deleted-tools') || '[]');
          
          const allTools = [...jsonTools.filter(t => !deletedIds.includes(t.id)), ...customTools];
          const visibleTools = allTools.filter(t => !hiddenIds.includes(t.id));

          const dDesk = document.getElementById('desktop-tools-dropdown');
          const dMob = document.getElementById('mobile-tools-dropdown');
          
          if(dDesk) dDesk.innerHTML = '';
          if(dMob) dMob.innerHTML = '';
          
          visibleTools.forEach(tool => {
            let href = tool.isStatic ? tool.path : 'dynamic-tool.html?id=' + tool.id;
            
            if(dDesk) {
              const a = document.createElement('a');
              a.href = href;
              a.className = 'nav-item-tool';
              a.style.cssText = 'display: flex; align-items: center; padding: 0.625rem 1rem; font-size: 0.875rem; transition: all 0.2s; color: var(--text-secondary); text-decoration: none;';
              a.innerHTML = `${tool.icon} ${tool.name}`;
              dDesk.appendChild(a);
            }
            if(dMob) {
              const a = document.createElement('a');
              a.href = href;
              a.className = 'nav-item-tool';
              a.style.cssText = 'padding: 0.625rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); text-decoration: none;';
              a.innerHTML = `${tool.icon} ${tool.name}`;
              dMob.appendChild(a);
            }
          });
        } catch(e) { console.error('Nav Load Error', e); }
      }
      document.addEventListener('DOMContentLoaded', loadNavTools);
    </script>
  </header>

    <main class="tool-container" style="padding-top: 6rem;">
        <div id="tool-content" class="reveal-hidden">
            <!-- Tool Header -->
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                <div id="tool-icon" class="flex-center" style="width: 4.5rem; height: 4.5rem; border-radius: 1.25rem; font-size: 2.25rem; background: rgba(255,255,255,0.05); flex-shrink: 0;">
                    ✨
                </div>
                <div style="min-width: 0;">
                    <h1 id="tool-name" class="font-display font-bold text-3xl" style="margin: 0; line-height: 1.2;">Loading Tool...</h1>
                    <p id="tool-tag" class="text-sm font-semibold uppercase tracking-widest" style="color: var(--accent-violet); margin-top: 0.5rem; letter-spacing: 0.1em;">AI TOOL</p>
                </div>
            </div>

            <p id="tool-desc" class="text-lg leading-relaxed mb-8" style="color: var(--text-secondary);">
                Please wait while we prepare your tool.
            </p>

            <!-- Dynamic Form -->
            <div class="glass-card" style="border-radius: 1.5rem; padding: 2.5rem; border: 1px solid rgba(255,255,255,0.05);">
                <div id="inputs-container">
                    <!-- JS will inject inputs here -->
                </div>
                
                <button id="generate-btn" class="btn-primary w-full" style="margin-top: 1rem; padding: 1.125rem; border-radius: 0.75rem; font-weight: 600; font-size: 1rem;">
                    Generate Prompt ✨
                </button>
            </div>

            <!-- Result Area -->
            <div id="result-area" class="result-area">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem;">
                    <h2 class="font-display font-semibold text-xl" style="color: var(--text-primary);">Generated Result</h2>
                    <button id="copy-btn" class="btn btn-ghost" style="color: var(--accent-violet-light); font-size: 0.875rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy to Clipboard
                    </button>
                </div>
                <div id="prompt-output" class="glass-card" style="border-radius: 1.25rem; padding: 1.75rem; background: rgba(0,0,0,0.25); border: 1px dashed rgba(255,255,255,0.1); font-family: 'Inter', monospace; white-space: pre-wrap; line-height: 1.7; color: var(--text-primary); font-size: 0.95rem;">
                    <!-- Result text here -->
                </div>
                
                <p class="text-xs text-muted" style="margin-top: 1.5rem; text-align: center;">
                    Tip: Paste this prompt into ChatGPT or Gemini to get the best AI results! 🚀
                </p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/script.js"></script>
    <script src="js/dynamic.js"></script>
</body>
</html>
