<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Motivation — Stay Inspired | Toolsathi</title>
  <meta name="description" content="Fuel your study sessions with handpicked motivational quotes. A premium inspiration tool for students on Toolsathi.">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .quote-card {
      max-width: 800px;
      margin: 4rem auto;
      padding: 4rem 3rem;
      border-radius: 2.5rem;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(124, 58, 237, 0.05) 100%);
      border: 1px solid rgba(245, 158, 11, 0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }
    .quote-icon {
      font-size: 4rem;
      color: var(--accent-gold);
      opacity: 0.2;
      position: absolute;
      top: 1rem;
      left: 2rem;
    }
    #quote-text {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 2rem;
      transition: opacity 0.5s;
    }
    #quote-author {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--accent-violet-light);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn-refresh {
      margin-top: 3rem;
      background: linear-gradient(135deg, #7C3AED, #F59E0B);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.3s;
      box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.3);
    }
    .btn-refresh:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="bg-primary">
  
  <header class="glass-nav z-50">
    <div style="max-width: 72rem; margin: 0 auto; padding: 0 1rem; height: 4rem; display: flex; align-items: center; justify-content: space-between;">
      <a href="../index.html" class="logo flex items-center cursor-pointer hover:opacity-80 transition-opacity group" style="text-decoration: none; gap: 0.5rem;" >
        <img src="/assets/images/app_logo.png" alt="Toolsathi Logo" class="app-logo flex-shrink-0" loading="lazy" onerror="this.onerror=null; this.outerHTML='<span style=\'display:flex; width:32px; height:32px; align-items:center; justify-content:center; background:var(--accent-violet); color:white; border-radius:0.25rem; font-weight:bold;\'>T</span>'" />
        <span class="font-display font-semibold text-lg tracking-tight" style="color: var(--text-primary);">Toolsathi</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html" class="nav-item">Home</a>
        <a href="../ai-tools.html" class="nav-item">AI Tools</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <main style="padding-top: 8rem;">
    <div style="max-width: 72rem; margin: 0 auto; padding: 0 1.5rem;">
      <div class="quote-card animate-reveal">
        <div class="quote-icon">“</div>
        <p id="quote-text">Believe you can and you're halfway there.</p>
        <p id="quote-author">— Theodore Roosevelt</p>
        
        <button onclick="newQuote()" class="btn-refresh">Generate New Inspiration ⚡</button>
      </div>
    </div>
  </main>

  <script>
    const quotes = [
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
      { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "The only place where success comes before work is in the dictionary.", author: "Vidal Sassoon" },
      { text: "Focus on being productive instead of busy.", author: "Tim Ferriss" },
      { text: "Your talent determines what you can do. Your motivation determines how much you are willing to do. Your attitude determines how well you do it.", author: "Lou Holtz" },
      { text: "Education is the most powerful weapon which you can use to change the world.", author: "Nelson Mandela" },
      { text: "Self-discipline is the magic power that makes you virtually unstoppable.", author: "Dan Kennedy" }
    ];

    function newQuote() {
      const textEl = document.getElementById('quote-text');
      const authorEl = document.getElementById('quote-author');
      
      textEl.style.opacity = '0';
      
      setTimeout(() => {
        const random = quotes[Math.floor(Math.random() * quotes.length)];
        textEl.textContent = random.text;
        authorEl.textContent = "— " + random.author;
        textEl.style.opacity = '1';
      }, 300);
    }

    // Initialize random quote
    document.addEventListener('DOMContentLoaded', newQuote);

    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
