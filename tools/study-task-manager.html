<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Task Manager — Stay Organized | Toolsathi</title>
  <meta name="description" content="A simple, elegant, and persistent study task manager for students. Organize your daily academic goals with Toolsathi.">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .task-card {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2.5rem;
      border-radius: 2rem;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.08) 0%, rgba(124, 58, 237, 0.02) 100%);
      border: 1px solid rgba(124, 58, 237, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    .input-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .task-input {
      flex: 1;
      padding: 0.875rem 1.25rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .task-input:focus {
      border-color: var(--accent-violet);
      background: rgba(124, 58, 237, 0.05);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.3s ease-out;
    }

    .task-item:hover {
      transform: translateX(5px);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(124, 58, 237, 0.3);
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-checkbox {
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 0.375rem;
      border: 2px solid var(--accent-violet);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .task-checkbox.checked {
      background: var(--accent-violet);
    }

    .task-text {
      flex: 1;
      font-size: 0.9375rem;
      color: var(--text-primary);
    }

    .delete-btn {
      opacity: 0;
      padding: 0.5rem;
      border-radius: 0.5rem;
      color: #EF4444;
      cursor: pointer;
      transition: all 0.2s;
    }

    .task-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-primary">

  <!-- Navigation -->
  <header class="glass-nav z-50">
    <div style="max-width: 72rem; margin: 0 auto; padding: 0 1rem; height: 4rem; display: flex; align-items: center; justify-content: space-between;">
      <a href="../index.html" class="logo flex items-center cursor-pointer hover:opacity-80 transition-opacity group" style="text-decoration: none; gap: 0.5rem;" >
        <img src="/assets/images/app_logo.png" alt="Toolsathi Logo" class="app-logo flex-shrink-0" loading="lazy" onerror="this.onerror=null; this.outerHTML='<span style=\'display:flex; width:32px; height:32px; align-items:center; justify-content:center; background:var(--accent-violet); color:white; border-radius:0.25rem; font-weight:bold;\'>T</span>'" />
        <span class="font-display font-semibold text-lg tracking-tight" style="color: var(--text-primary);">Toolsathi</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html" class="nav-item">Home</a>
        <a href="../ai-tools.html" class="nav-item">AI Tools</a>
        <a href="../blog.html" class="nav-item">Blog</a>
        <a href="../about.html" class="nav-item">About</a>
      </nav>
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <button class="theme-toggle" id="theme-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main style="padding-top: 6rem; min-height: 80vh;">
    <div style="max-width: 72rem; margin: 0 auto; padding: 0 1.5rem;">
      <div class="text-center mb-12">
        <div class="badge badge-violet mb-4">Productivity Tool</div>
        <h1 class="font-display font-bold" style="font-size: 2.5rem; margin-bottom: 1rem;">Study Task Manager</h1>
        <p style="color: var(--text-secondary); max-width: 28rem; margin: 0 auto;">Organize your study sessions and track your progress daily. Your data stays saved in this browser.</p>
      </div>

      <div class="task-card">
        <div class="input-row">
          <input type="text" id="task-input" class="task-input" placeholder="What do you need to study today?" onkeypress="if(event.key==='Enter') addTask()">
          <button onclick="addTask()" class="btn-primary" style="padding: 0 1.5rem; height: auto;">Add Task</button>
        </div>

        <div id="task-list"></div>

        <div id="empty-msg" class="empty-state">
          <div style="font-size: 3rem; margin-bottom: 1rem;">🎯</div>
          <p>No study tasks yet. Start by adding one above!</p>
        </div>
      </div>
    </div>
  </main>

  <footer style="margin-top: 4rem; border-top: 1px solid var(--border-subtle); padding: 2.5rem 0;">
    <div style="max-width: 72rem; margin: 0 auto; padding: 0 1.5rem; text-align: center;">
      <p style="font-size: 0.875rem; color: var(--text-muted);">&copy; 2024 Toolsathi. Built for students, by students.</p>
    </div>
  </footer>

  <script>
    let tasks = [];

    document.addEventListener('DOMContentLoaded', () => {
      const savedTasks = localStorage.getItem('ts-study-tasks');
      if (savedTasks) {
        tasks = JSON.parse(savedTasks);
        renderTasks();
      }
      
      // Theme Logic
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
      }
    });

    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    });

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (text) {
        tasks.push({ id: Date.now(), text, completed: false });
        input.value = '';
        saveTasks();
        renderTasks();
      }
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    }

    function saveTasks() {
      localStorage.setItem('ts-study-tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      const emptyMsg = document.getElementById('empty-msg');
      
      if (tasks.length === 0) {
        emptyMsg.style.display = 'block';
        list.innerHTML = '';
        return;
      }

      emptyMsg.style.display = 'none';
      list.innerHTML = tasks.sort((a,b) => a.completed - b.completed).map(task => `
        <div class="task-item ${task.completed ? 'completed' : ''}">
          <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
            ${task.completed ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          </div>
          <span class="task-text">${task.text}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
